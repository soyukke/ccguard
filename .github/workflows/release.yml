name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches build.zig.zon version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          zon=$(grep '\.version = ' build.zig.zon | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "tag: $tag, build.zig.zon: $zon"
          if [ "$tag" != "$zon" ]; then
            echo "::error::Tag v${tag} does not match build.zig.zon version ${zon}"
            exit 1
          fi

  test:
    needs: version-check
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - run: zig build test

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
          - os: ubuntu-latest
            target: aarch64-linux
          - os: macos-latest
            target: x86_64-macos
          - os: macos-latest
            target: aarch64-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Build
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}
      - name: Package
        run: |
          tar czf ccguard-${{ matrix.target }}.tar.gz -C zig-out/bin ccguard
      - uses: actions/upload-artifact@v4
        with:
          name: ccguard-${{ matrix.target }}
          path: ccguard-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ccguard-*.tar.gz
